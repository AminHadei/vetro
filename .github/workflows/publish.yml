name: Publish

on:
  push:
    tags: ['v*']

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Match tag to package.json
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "package.json: ${PACKAGE_VERSION}"
          echo "tag: ${GITHUB_REF_NAME} (${TAG_VERSION})"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Check registry for duplicate version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "vetro@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "ERROR: Version ${PACKAGE_VERSION} already exists on the npm registry."
            exit 1
          fi
          echo "Version ${PACKAGE_VERSION} is available for publishing."

  build:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Write production .env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${ENV_PRODUCTION}" ]; then
            echo "ERROR: ENV_PRODUCTION secret is not set"
            exit 1
          fi
          printf '%s' "${ENV_PRODUCTION}" > .env

      - name: Build lib and web components
        run: vp run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npm:
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag latest --ignore-scripts

  publish-webc:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: oven-sh/setup-bun@v2

      - name: Upload web components to CDN
        env:
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          VITE_S3_CDN_URL: ${{ secrets.VITE_S3_CDN_URL }}
        run: bun run tools/ci/publish-webc.ts

  github-release:
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## " && found { exit }
            $0 ~ "^## " && $0 ~ ("(^##[[:space:]]+v?" v "([[:space:]]|$))") { found=1 }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: false
