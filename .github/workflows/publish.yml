name: Publish

# Publishes to npm when package.json version is not yet on the registry.
# Triggered by every push to main (including merges). Skips cleanly if the
# version is already published so routine merges do not fail the workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          # package.json has packageManager: pnpm; don't auto-cache before pnpm exists
          package-manager-cache: false

      - name: Decide whether to publish
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "package.json version: ${VERSION}"

          if npm view "vetro@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} is already on npm — skipping publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VERSION} is not on npm — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: decide
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Write production .env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${ENV_PRODUCTION}" ]; then
            echo "ERROR: ENV_PRODUCTION secret is not set"
            exit 1
          fi
          printf '%s' "${ENV_PRODUCTION}" > .env

      - name: Build lib and web components
        run: vp run build

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-npm:
    needs: [decide, build]
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag latest --access public --ignore-scripts

  publish-webc:
    needs: [decide, build]
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - uses: oven-sh/setup-bun@v2

      - name: Upload web components to CDN
        env:
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          VITE_S3_CDN_URL: ${{ secrets.VITE_S3_CDN_URL }}
        run: bun run tools/ci/publish-webc.ts

  github-release:
    needs: [decide, publish-npm]
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract changelog section
        id: notes
        env:
          VERSION: ${{ needs.decide.outputs.version }}
        run: |
          set -euo pipefail
          awk -v v="$VERSION" '
            $0 ~ "^## " && found { exit }
            $0 ~ "^## " && $0 ~ ("(^##[[:space:]]+v?" v "([[:space:]]|$))") { found=1 }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v${VERSION}" > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.decide.outputs.version }}
          name: Release v${{ needs.decide.outputs.version }}
          body_path: release_notes.md
          generate_release_notes: false
          target_commitish: ${{ github.sha }}
