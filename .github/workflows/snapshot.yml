name: Publish snapshot

# Publishes a prerelease to npm (dist-tag pr-<number>) and uploads webc to CDN for QA.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number

concurrency:
  group: snapshot-pr-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Check out PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ inputs.pr_number }}

      - name: Snapshot version
        run: |
          SNAPSHOT_TAG="pr-${{ inputs.pr_number }}"
          echo "Bumping to snapshot version with tag: ${SNAPSHOT_TAG}"
          vp exec changeset version --snapshot "${SNAPSHOT_TAG}"
          node -p "require('./package.json').version"

      - name: Write production .env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${ENV_PRODUCTION}" ]; then
            echo "ERROR: ENV_PRODUCTION secret is not set"
            exit 1
          fi
          printf '%s' "${ENV_PRODUCTION}" > .env

      - name: Build
        run: vp run build

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish snapshot to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --tag "pr-${{ inputs.pr_number }}" --ignore-scripts --no-git-checks
          echo "Install with: pnpm add vetro-ui@pr-${{ inputs.pr_number }}"

      - uses: oven-sh/setup-bun@v2

      - name: Upload web components to CDN
        env:
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          VITE_S3_CDN_URL: ${{ secrets.VITE_S3_CDN_URL }}
        run: bun run tools/ci/publish-webc.ts
