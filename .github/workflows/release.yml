name: Release

# Consumes pending changesets on main, bumps version, updates CHANGELOG, commits, and tags.
# Publishing to npm/CDN runs automatically when the tag is pushed (publish.yml).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Require pending changesets
        run: |
          set -euo pipefail
          PENDING=$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' 2>/dev/null || true)
          if [ -z "$PENDING" ]; then
            echo "No pending changesets — nothing to release."
            exit 1
          fi
          echo "Pending changesets:"
          printf '%s\n' "$PENDING" | sed 's/^/  /'

      - name: Version packages
        run: vp run changeset:version

      - name: Commit and tag
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json CHANGELOG.md .changeset
          git commit -m "chore(release): v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main "v${VERSION}"
          echo "Released v${VERSION}"
