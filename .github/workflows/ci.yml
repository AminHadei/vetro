name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Lint, format, typecheck
        run: vp check && vp run typecheck

      - name: Check changeset
        if: github.event_name == 'pull_request'
        env:
          TARGET_BRANCH: ${{ github.base_ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: bash tools/ci/check-changeset.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: .nvmrc

      - name: Test with coverage
        run: vp test run --coverage

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  coverage-reporter:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: coverage
          path: coverage

      - uses: oven-sh/setup-bun@v2

      - name: Post coverage report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run tools/ci/test-coverage-reporter.ts

  test-failure-notifier:
    needs: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: coverage
          path: coverage

      - uses: oven-sh/setup-bun@v2

      - name: Notify on test failures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run tools/ci/test-failure-notifier.ts
